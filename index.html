<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Rock</title>
  <meta name="description" content="Plataforma confiable, atención personalizada y soporte permanente." />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #14051f;
    }
    .page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.08), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255,180,0,0.1), transparent 30%),
        #14051f;
    }
    .hero {
      position: relative;
      width: min(100vw, 560px);
      min-height: 100vh;
      overflow: hidden;
      background: #14051f;
      box-shadow: 0 0 60px rgba(0,0,0,.35);
    }
    .hero img.bg {
      width: 100%;
      height: auto;
      display: block;
    }
    .cta-wrap {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: clamp(22px, 3.5vw, 34px);
      width: min(86%, 430px);
      z-index: 3;
    }
    .cover-base {
      position: absolute;
      inset: -10px -8px -10px -8px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 50%, rgba(120, 0, 180, 0.45), rgba(30, 0, 55, 0.92) 70%),
        linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.03));
      filter: blur(6px);
      z-index: -2;
      box-shadow:
        0 0 30px rgba(170, 60, 255, 0.45),
        0 0 70px rgba(255, 180, 0, 0.18);
    }
    .cta {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      min-height: 72px;
      padding: 18px 22px;
      text-decoration: none;
      border-radius: 999px;
      color: #fff6c9;
      font-weight: 900;
      font-style: italic;
      letter-spacing: .4px;
      font-size: clamp(22px, 5vw, 34px);
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(75, 25, 0, 0.45);
      border: 2px solid rgba(255, 214, 95, 0.95);
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0) 28%),
        linear-gradient(180deg, #29df77 0%, #0abf59 52%, #03994a 100%);
      box-shadow:
        0 10px 22px rgba(0,0,0,.45),
        0 0 0 2px rgba(255,255,255,.12) inset,
        0 0 26px rgba(30, 255, 130, .35),
        0 6px 0 rgba(12, 90, 39, .9);
      overflow: hidden;
      animation: pulse 1.6s ease-in-out infinite;
    }
    .cta::before {
      content: "";
      position: absolute;
      top: -35%;
      left: -35%;
      width: 36%;
      height: 180%;
      transform: rotate(18deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.45), transparent);
      animation: shine 2.4s linear infinite;
      pointer-events: none;
    }
    .cta::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 999px;
      box-shadow: 0 0 30px rgba(255, 235, 120, .28) inset;
      pointer-events: none;
    }
    .wpp-icon {
      width: clamp(28px, 5vw, 38px);
      height: clamp(28px, 5vw, 38px);
      flex: 0 0 auto;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,.35));
    }
    .helper {
      margin-top: 10px;
      text-align: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.65);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.035); }
    }
    @keyframes shine {
      0% { left: -40%; }
      100% { left: 120%; }
    }
    .float {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 66px;
      height: 66px;
      border-radius: 999px;
      background: linear-gradient(180deg, #31ea7d, #0faa56);
      display: grid;
      place-items: center;
      box-shadow:
        0 10px 20px rgba(0,0,0,.35),
        0 0 24px rgba(30,255,130,.35);
      border: 2px solid rgba(255,255,255,.8);
      z-index: 4;
      animation: floaty 1.8s ease-in-out infinite;
    }
    .float svg {
      width: 34px;
      height: 34px;
    }
    @keyframes floaty {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>

  <script>
    const targetUrl = "https://www.linkify.com.ar/api/soporte?id=a1dn79";

    function trackConversion(label) {
      if (typeof window.fbq === "function") {
        try {
          window.fbq("track", "Lead");
          window.fbq("trackCustom", "WhatsAppClick", { source: label });
        } catch (e) {}
      }
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: "whatsapp_click",
        click_source: label
      });
      window.dispatchEvent(new CustomEvent("conversion_click", {
        detail: { source: label }
      }));
    }

    function handleClick(event, label) {
      event.preventDefault();
      trackConversion(label);
      window.open(targetUrl, "_blank", "noopener,noreferrer");
    }

    document.getElementById("wppBtn").addEventListener("click", function(e) {
      handleClick(e, "main_button");
    });

    document.getElementById("wppFloat").addEventListener("click", function(e) {
      handleClick(e, "floating_button");
    });
  </script>
